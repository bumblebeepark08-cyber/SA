    .container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      max-width: 100vw;
      max-height: 80vh;

    }

    img {
      max-width: 100vw;
      max-height: 80vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .close-btn {

      font-size: 18px;

    }

      font-size: 18px;
      color: #0f0;

    }

      padding: 10px 10px;
      font-size: 20px;
      border: none;
      border-radius: 6px;
      background-color: crimson;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: darkred;
    }
  </style>
